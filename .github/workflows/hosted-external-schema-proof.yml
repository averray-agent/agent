name: Hosted External Schema Proof

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: Proof job id. Leave blank for a unique archived proof job.
        required: false
        default: ""
        type: string

permissions:
  contents: read

concurrency:
  group: hosted-external-schema-proof
  cancel-in-progress: false

jobs:
  proof:
    name: Run hosted external schema registration proof
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    env:
      APP_ALLOW_PROTECTED_SHELL: "1"
      CHECK_INDEXER: "0"
      CHECK_EXTERNAL_SCHEMA_PROOF: "1"
      EXTERNAL_SCHEMA_PROOF_EVIDENCE_FILE: artifacts/external-schema-proof-hosted-${{ github.run_id }}.json
      EXTERNAL_SCHEMA_PROOF_JOB_ID: ${{ inputs.job_id }}
      EXTERNAL_SCHEMA_PROOF_IDEMPOTENCY_KEY: github-hosted-external-schema-proof-${{ github.run_id }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      # JWT-TTL hardening (F13): mint a SHORT-LIVED admin access token via the
      # refresh flow instead of loading the long-lived static admin JWT
      # (op://prod-smoke/admin-jwt). This is what lets JWT_MAX_TTL_SECONDS drop
      # from 30d to 1h on mainnet — see docs/MAINNET_CREDENTIALS_PLAN.md. A
      # DEDICATED per-consumer refresh item is used so this workflow never
      # rotate-collides with another consumer (refresh tokens rotate on every
      # use; replaying a stale one revokes the chain).
      - name: Install 1Password CLI (refresh-token rotation write-back)
        uses: 1password/install-cli-action@a5215d3a7f75c1629216c465ea9ab3ab399c4b71 # v4.0.0

      - name: Mint short-lived admin access token (refresh flow)
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN_PROD_SMOKE }}
          ADMIN_REFRESH_TOKEN_OP: op://prod-smoke/admin-refresh-token-schema-proof/password
          API_BASE_URL: https://api.averray.com
        run: |
          set -euo pipefail
          set +x

          # get-admin-refresh-token.mjs POSTs the refresh cookie to
          # /auth/refresh, prints a fresh access token to stdout, and writes
          # the rotated refresh cookie back to $ADMIN_REFRESH_TOKEN_OP (needs
          # the prod-smoke service account to have READ+WRITE on that item).
          token="$(node scripts/ops/get-admin-refresh-token.mjs)"

          if [ -z "${token:-}" ]; then
            echo "::error::refresh exchange returned an empty access token — check $ADMIN_REFRESH_TOKEN_OP is seeded and the prod-smoke service account has READ+WRITE on it."
            exit 1
          fi

          case "$token" in
            ey*.*.*)
              echo "minted admin access token: JWT shape valid"
              ;;
            *)
              echo "::error::minted value does not look like a JWT (expected ey<...>.<...>.<...>)"
              exit 1
              ;;
          esac

          echo "::add-mask::$token"
          printf 'ADMIN_ACCESS_TOKEN=%s\n' "$token" >> "$GITHUB_ENV"

      - name: Run hosted proof
        run: |
          set -euo pipefail
          set +x

          ADMIN_JWT="$ADMIN_ACCESS_TOKEN" ./scripts/ops/check-hosted-stack.sh

      - name: Summarize proof evidence
        if: always()
        run: |
          set -euo pipefail

          evidence_file="$EXTERNAL_SCHEMA_PROOF_EVIDENCE_FILE"
          if [ ! -s "$evidence_file" ]; then
            echo "No external-schema evidence file was produced." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          status="$(jq -r '.status' "$evidence_file")"
          job_id="$(jq -r '.jobId' "$evidence_file")"
          schema_ref="$(jq -r '.schemaRef' "$evidence_file")"
          issuer="$(jq -r '.issuer' "$evidence_file")"
          trust_boundary="$(jq -r '.definition.trustBoundary' "$evidence_file")"
          signature_verified="$(jq -r '.definition.outputSignatureVerified' "$evidence_file")"
          valid_status="$(jq -r '.validSubmission.status' "$evidence_file")"
          invalid_path="$(jq -r '.invalidSubmission.path' "$evidence_file")"

          {
            echo "## Hosted External Schema Proof"
            echo
            echo "- Status: \`${status}\`"
            echo "- Job: \`${job_id}\`"
            echo "- Schema: \`${schema_ref}\`"
            echo "- Issuer: \`${issuer}\`"
            echo "- Trust boundary: \`${trust_boundary}\`"
            echo "- Signature verified: \`${signature_verified}\`"
            echo "- Valid submission status: \`${valid_status}\`"
            echo "- Invalid submission path: \`${invalid_path}\`"
            echo "- Evidence artifact: \`hosted-external-schema-proof-${GITHUB_RUN_ID}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload sanitized external-schema proof evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: hosted-external-schema-proof-${{ github.run_id }}
          path: ${{ env.EXTERNAL_SCHEMA_PROOF_EVIDENCE_FILE }}
          if-no-files-found: error
          retention-days: 90
